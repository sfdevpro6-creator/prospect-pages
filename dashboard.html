function VideoManager({profile, user}) {
  const [videos, setVideos] = useState([]);
  const [loading, setLoading] = useState(true);
  const [showAdd, setShowAdd] = useState(false);
  const [editId, setEditId] = useState(null);
  const [form, setForm] = useState({title:"",category:"",video_url:"",duration:"1:00",meta_text:""});
  const [uploading, setUploading] = useState(false);
  const [uploadProgress, setUploadProgress] = useState(0);
  const [uploadFileName, setUploadFileName] = useState("");
  const sport = profile?.athlete_sport || "baseball";

  const SPORT_CATS = {
    baseball:[{key:"pitching",label:"Pitching"},{key:"hitting",label:"Hitting"},{key:"fielding",label:"Fielding / 1B"}],
    softball:[{key:"pitching",label:"Pitching"},{key:"hitting",label:"Hitting"},{key:"fielding",label:"Fielding"}],
    basketball:[{key:"offense",label:"Offense"},{key:"defense",label:"Defense"},{key:"highlights",label:"Highlights"}],
    football:[{key:"offense",label:"Offense"},{key:"defense",label:"Defense"},{key:"special_teams",label:"Special Teams"}],
    soccer:[{key:"goals",label:"Goals"},{key:"assists",label:"Assists"},{key:"defense",label:"Defense"}],
    volleyball:[{key:"offense",label:"Offense"},{key:"defense",label:"Defense"},{key:"serves",label:"Serves"}],
    track:[{key:"sprints",label:"Sprints"},{key:"jumps",label:"Jumps"},{key:"throws",label:"Throws"}],
  };
  const cats = SPORT_CATS[sport] || SPORT_CATS.baseball;

  useEffect(()=>{loadVideos();},[user]);

  const loadVideos = async () => {
    setLoading(true);
    try { const d = await supaFetch(`/rest/v1/videos?user_id=eq.${user.id}&order=sort_order.asc`); setVideos(d||[]); }
    catch(e) { console.log("Load videos:",e); }
    setLoading(false);
  };

  const resetForm = () => {setForm({title:"",category:cats[0]?.key||"",video_url:"",duration:"1:00",meta_text:""});setUploadFileName("");};

  const handleUpload = (file) => {
    if(!file) return;
    if(!file.type.startsWith("video/")) return alert("Please upload a video file (mp4, mov, etc.).");
    if(file.size > 500*1024*1024) return alert("File too large. Max 500MB.");
    setUploading(true); setUploadProgress(0); setUploadFileName(file.name);
    const fd = new FormData();
    fd.append("file", file);
    fd.append("upload_preset", "prospect-pages-videos");
    fd.append("resource_type", "video");
    const xhr = new XMLHttpRequest();
    xhr.open("POST", "https://api.cloudinary.com/v1_1/dcm7qt50x/video/upload");
    xhr.upload.onprogress = (e) => { if(e.lengthComputable) setUploadProgress(Math.round(e.loaded/e.total*100)); };
    xhr.onload = () => {
      setUploading(false);
      if(xhr.status===200) {
        const data = JSON.parse(xhr.responseText);
        // Use .mp4 transform URL for guaranteed H.264 playback
        const url = data.secure_url.replace("/upload/", "/upload/f_mp4/");
        const dur = data.duration ? (Math.floor(data.duration/60)+":"+(Math.floor(data.duration%60)+"").padStart(2,"0")) : "1:00";
        setForm(f=>({...f, video_url:url, duration:dur}));
        // Auto-fill title from filename if empty
        if(!form.title) {
          const name = file.name.replace(/\.[^.]+$/,"").replace(/[_-]/g," ");
          setForm(f=>({...f, title:name}));
        }
      } else { alert("Upload failed. Try again."); }
    };
    xhr.onerror = () => { setUploading(false); alert("Upload failed. Check your connection."); };
    xhr.send(fd);
  };

  const handleAdd = async () => {
    if(!form.title||!form.video_url) return alert("Title and Video URL/path are required.");
    try {
      await supaFetch("/rest/v1/videos",{method:"POST",body:{user_id:user.id,title:form.title,category:form.category||cats[0].key,video_url:form.video_url,duration:form.duration||"1:00",meta_text:form.meta_text||"",sort_order:videos.length}});
      resetForm(); setShowAdd(false); await loadVideos();
    } catch(e) { alert("Error: "+e.message); }
  };

  const handleEdit = async (id) => {
    try {
      await supaFetch(`/rest/v1/videos?id=eq.${id}`,{method:"PATCH",body:{title:form.title,category:form.category,video_url:form.video_url,duration:form.duration,meta_text:form.meta_text,updated_at:new Date().toISOString()}});
      setEditId(null); resetForm(); await loadVideos();
    } catch(e) { alert("Error: "+e.message); }
  };

  const handleDelete = async (id) => {
    if(!confirm("Delete this video clip?")) return;
    try { await supaFetch(`/rest/v1/videos?id=eq.${id}`,{method:"DELETE"}); await loadVideos(); }
    catch(e) { alert("Error: "+e.message); }
  };

  const handleMove = async (idx, dir) => {
    const nv = [...videos];
    const si = idx+dir;
    if(si<0||si>=nv.length) return;
    [nv[idx],nv[si]] = [nv[si],nv[idx]];
    try {
      await supaFetch(`/rest/v1/videos?id=eq.${nv[idx].id}`,{method:"PATCH",body:{sort_order:idx}});
      await supaFetch(`/rest/v1/videos?id=eq.${nv[si].id}`,{method:"PATCH",body:{sort_order:si}});
      setVideos(nv);
    } catch(e) { alert("Error: "+e.message); }
  };

  const startEdit = (v) => { setEditId(v.id); setForm({title:v.title,category:v.category,video_url:v.video_url,duration:v.duration||"1:00",meta_text:v.meta_text||""}); };

  const inp={width:"100%",padding:"10px 14px",background:C.navyLight,border:`1px solid ${C.border}`,borderRadius:8,color:C.cream,fontSize:13,fontFamily:"'Barlow',sans-serif",outline:"none",boxSizing:"border-box"};
  const lbl={fontSize:11,color:C.textMuted,fontWeight:600,textTransform:"uppercase",letterSpacing:1,display:"block",marginBottom:4};
  const catColor = (cat) => {const m={pitching:"#4A90D9",hitting:"#E6A23C",fielding:"#67C23A",offense:"#E6A23C",defense:"#4A90D9",highlights:"#C41E3A",special_teams:"#67C23A",goals:"#E6A23C",assists:"#4A90D9",serves:"#67C23A",sprints:"#E6A23C",jumps:"#4A90D9",throws:"#67C23A"};return m[cat]||C.gold;};

  const renderForm = (onSubmit, submitLabel) => (
    <div style={{display:"flex",flexDirection:"column",gap:12}}>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12}}>
        <div><label style={lbl}>Title</label><input value={form.title} onChange={e=>setForm(f=>({...f,title:e.target.value}))} placeholder="vs. San Marcos — Pitching" style={inp}/></div>
        <div><label style={lbl}>Category</label><select value={form.category} onChange={e=>setForm(f=>({...f,category:e.target.value}))} style={{...inp,cursor:"pointer"}}>{cats.map(c=>(<option key={c.key} value={c.key}>{c.label}</option>))}</select></div>
      </div>
      <div>
        <label style={lbl}>Video File</label>
        {form.video_url ? (
          <div style={{padding:"12px 16px",background:C.navyLight,border:`1px solid ${C.gold}40`,borderRadius:8,display:"flex",alignItems:"center",gap:10}}>
            <div style={{flex:1,minWidth:0}}>
              <div style={{fontSize:13,fontWeight:600,color:C.gold,whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>{uploadFileName||"Video ready"}</div>
              <div style={{fontSize:11,color:C.textDim,marginTop:2,whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>{form.video_url.length>60?form.video_url.slice(0,60)+"...":form.video_url}</div>
            </div>
            <button onClick={()=>{setForm(f=>({...f,video_url:""}));setUploadFileName("");}} style={{background:"transparent",border:`1px solid ${C.red}30`,borderRadius:6,color:C.red,cursor:"pointer",padding:"4px 10px",fontSize:11,fontWeight:600,flexShrink:0}}>Remove</button>
          </div>
        ) : uploading ? (
          <div style={{padding:"20px 16px",background:C.navyLight,border:`1px solid ${C.border}`,borderRadius:8,textAlign:"center"}}>
            <div style={{fontSize:13,fontWeight:600,color:C.cream,marginBottom:8}}>Uploading {uploadFileName}...</div>
            <div style={{width:"100%",height:6,background:C.border,borderRadius:3,overflow:"hidden"}}>
              <div style={{width:uploadProgress+"%",height:"100%",background:C.red,borderRadius:3,transition:"width 0.3s"}}/>
            </div>
            <div style={{fontSize:11,color:C.textDim,marginTop:6}}>{uploadProgress}%</div>
          </div>
        ) : (
          <div
            onDragOver={e=>{e.preventDefault();e.currentTarget.style.borderColor=C.gold;}}
            onDragLeave={e=>{e.currentTarget.style.borderColor=C.border;}}
            onDrop={e=>{e.preventDefault();e.currentTarget.style.borderColor=C.border;handleUpload(e.dataTransfer.files[0]);}}
            onClick={()=>{const i=document.createElement("input");i.type="file";i.accept="video/*";i.onchange=e=>handleUpload(e.target.files[0]);i.click();}}
            style={{padding:"28px 16px",background:C.navyLight,border:`2px dashed ${C.border}`,borderRadius:8,textAlign:"center",cursor:"pointer",transition:"border-color 0.2s"}}
          >
            <div style={{fontSize:24,marginBottom:6}}>🎬</div>
            <div style={{fontSize:13,fontWeight:600,color:C.cream}}>Drop video file here or click to browse</div>
            <div style={{fontSize:11,color:C.textDim,marginTop:4}}>MP4, MOV, or any video format. Auto-converts for all browsers.</div>
          </div>
        )}
      </div>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12}}>
        <div><label style={lbl}>Duration</label><input value={form.duration} onChange={e=>setForm(f=>({...f,duration:e.target.value}))} placeholder="1:02" style={inp}/></div>
        <div><label style={lbl}>Description</label><input value={form.meta_text} onChange={e=>setForm(f=>({...f,meta_text:e.target.value}))} placeholder="2026 Varsity" style={inp}/></div>
      </div>
      <div style={{display:"flex",gap:8}}>
        <button onClick={onSubmit} style={{flex:1,padding:"10px 0",background:C.red,border:"none",borderRadius:8,color:C.cream,cursor:"pointer",fontFamily:"'Barlow Condensed',sans-serif",fontWeight:700,fontSize:14,letterSpacing:1,textTransform:"uppercase"}}>{submitLabel}</button>
        <button onClick={()=>{setShowAdd(false);setEditId(null);resetForm();}} style={{padding:"10px 20px",background:"transparent",border:`1px solid ${C.border}`,borderRadius:8,color:C.textMuted,cursor:"pointer",fontFamily:"'Barlow Condensed',sans-serif",fontWeight:600,fontSize:13}}>Cancel</button>
      </div>
    </div>
  );

  return (
    <div style={{maxWidth:700}}>
      <div style={{background:C.cardBg,border:`1px solid ${C.border}`,borderRadius:10,padding:32}}>
        <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:4}}>
          <div style={{fontFamily:"'Bebas Neue',sans-serif",fontSize:22,letterSpacing:2}}>GAME FILM</div>
          <div style={{padding:"4px 12px",background:`${C.red}20`,border:`1px solid ${C.red}40`,borderRadius:6,fontSize:11,fontWeight:700,color:C.red,textTransform:"uppercase",letterSpacing:1,fontFamily:"'Barlow Condensed',sans-serif"}}>{videos.length} clips</div>
        </div>
        <div style={{fontSize:13,color:C.textMuted,marginBottom:24}}>Manage your highlight clips. Reorder, categorize, and publish them to your recruiting site.</div>

        {loading ? <div style={{textAlign:"center",padding:40,color:C.textDim}}>Loading videos...</div> : (
          <div>
            {/* Video List */}
            {videos.map((v,i) => (
              <div key={v.id} style={{display:"flex",alignItems:"center",gap:12,padding:"14px 16px",background:editId===v.id?C.navyLight:"transparent",border:`1px solid ${editId===v.id?C.gold+"40":C.border}`,borderRadius:8,marginBottom:8,transition:"all 0.15s"}}>
                {editId===v.id ? (
                  <div style={{flex:1}}>{renderForm(()=>handleEdit(v.id), "Save Changes")}</div>
                ) : (
                  <Fragment>
                    {/* Reorder buttons */}
                    <div style={{display:"flex",flexDirection:"column",gap:2}}>
                      <button onClick={()=>handleMove(i,-1)} disabled={i===0} style={{background:"transparent",border:"none",color:i===0?C.border:C.textMuted,cursor:i===0?"default":"pointer",fontSize:16,padding:"2px 4px",lineHeight:1}}>▲</button>
                      <button onClick={()=>handleMove(i,1)} disabled={i===videos.length-1} style={{background:"transparent",border:"none",color:i===videos.length-1?C.border:C.textMuted,cursor:i===videos.length-1?"default":"pointer",fontSize:16,padding:"2px 4px",lineHeight:1}}>▼</button>
                    </div>
                    {/* Number */}
                    <div style={{width:28,height:28,borderRadius:"50%",background:C.navyLight,display:"flex",alignItems:"center",justifyContent:"center",fontSize:11,fontWeight:700,color:C.textDim,flexShrink:0}}>{String(i+1).padStart(2,"0")}</div>
                    {/* Info */}
                    <div style={{flex:1,minWidth:0}}>
                      <div style={{fontSize:14,fontWeight:600,color:C.cream,whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>{v.title}</div>
                      <div style={{display:"flex",alignItems:"center",gap:8,marginTop:2}}>
                        <span style={{fontSize:10,fontWeight:700,textTransform:"uppercase",letterSpacing:1,color:catColor(v.category),background:catColor(v.category)+"18",padding:"2px 8px",borderRadius:4}}>{v.category}</span>
                        <span style={{fontSize:11,color:C.textDim}}>{v.duration}</span>
                        {v.meta_text&&<span style={{fontSize:11,color:C.textDim}}>• {v.meta_text}</span>}
                      </div>
                    </div>
                    {/* Actions */}
                    <div style={{display:"flex",gap:4,flexShrink:0}}>
                      <button onClick={()=>startEdit(v)} style={{background:C.navyLight,border:`1px solid ${C.border}`,borderRadius:6,color:C.textMuted,cursor:"pointer",padding:"6px 10px",fontSize:11,fontWeight:600}}>Edit</button>
                      <button onClick={()=>handleDelete(v.id)} style={{background:"transparent",border:`1px solid ${C.red}30`,borderRadius:6,color:C.red,cursor:"pointer",padding:"6px 10px",fontSize:11,fontWeight:600}}>✕</button>
                    </div>
                  </Fragment>
                )}
              </div>
            ))}

            {videos.length===0&&!showAdd&&(
              <div style={{textAlign:"center",padding:"40px 20px",color:C.textDim}}>
                <div style={{fontSize:36,marginBottom:8}}>🎬</div>
                <div style={{fontSize:14,marginBottom:4}}>No video clips yet</div>
                <div style={{fontSize:12}}>Add your first highlight clip below</div>
              </div>
            )}

            {/* Add Form */}
            {showAdd ? (
              <div style={{background:C.navyLight,border:`1px solid ${C.gold}40`,borderRadius:8,padding:16,marginTop:8}}>
                <div style={{fontSize:13,fontWeight:700,color:C.gold,marginBottom:12,fontFamily:"'Barlow Condensed',sans-serif",textTransform:"uppercase",letterSpacing:1}}>Add New Clip</div>
                {renderForm(handleAdd, "Add Clip")}
              </div>
            ) : (
              <button onClick={()=>{resetForm();setForm(f=>({...f,category:cats[0]?.key||""}));setShowAdd(true);}} style={{width:"100%",padding:"12px 0",background:"transparent",border:`2px dashed ${C.border}`,borderRadius:8,color:C.textMuted,cursor:"pointer",fontFamily:"'Barlow Condensed',sans-serif",fontWeight:700,fontSize:14,letterSpacing:1,textTransform:"uppercase",marginTop:8,transition:"all 0.15s"}} onMouseOver={e=>{e.target.style.borderColor=C.gold;e.target.style.color=C.gold;}} onMouseOut={e=>{e.target.style.borderColor=C.border;e.target.style.color=C.textMuted;}}>+ Add Video Clip</button>
            )}
          </div>
        )}
      </div>

      <div style={{background:`${C.gold}10`,border:`1px solid ${C.gold}30`,borderRadius:10,padding:"16px 20px",marginTop:16,fontSize:13,color:C.textMuted}}>
        <strong style={{color:C.gold}}>How video uploads work:</strong> Drop a video file into the upload zone. It's automatically uploaded to the cloud and converted to a format that plays on every device. Hit Publish on the My Stats page to update your live site with the new clips.
      </div>
    </div>
  );
}

// ── PHOTO MANAGER ──
function PhotoManager({profile, setProfile, user}) {
  const [uploading, setUploading] = useState(null);
  const [uploadProgress, setUploadProgress] = useState(0);
  const [saved, setSaved] = useState(false);
  const [additionalPhotos, setAdditionalPhotos] = useState(profile?.additional_photos || []);

  const uploadToCloudinary = (file, onSuccess) => {
    if (!file) return;
    if (!file.type.startsWith("image/")) return alert("Please upload an image file (JPG, PNG, etc.).");
    if (file.size > 20 * 1024 * 1024) return alert("File too large. Max 20MB.");
    setUploadProgress(0);
    const fd = new FormData();
    fd.append("file", file);
    fd.append("upload_preset", "prospect-pages-videos");
    fd.append("resource_type", "image");
    const xhr = new XMLHttpRequest();
    xhr.open("POST", "https://api.cloudinary.com/v1_1/dcm7qt50x/image/upload");
    xhr.upload.onprogress = (e) => { if (e.lengthComputable) setUploadProgress(Math.round(e.loaded / e.total * 100)); };
    xhr.onload = () => {
      if (xhr.status === 200) {
        const data = JSON.parse(xhr.responseText);
        const url = data.secure_url;
        onSuccess(url);
      } else { alert("Upload failed. Try again."); }
      setUploading(null); setUploadProgress(0);
    };
    xhr.onerror = () => { setUploading(null); setUploadProgress(0); alert("Upload failed. Check your connection."); };
    xhr.send(fd);
  };

  const handleHeroUpload = (file) => {
    setUploading("hero");
    uploadToCloudinary(file, async (url) => {
      try {
        const d = await supaFetch(`/rest/v1/profiles?id=eq.${user.id}`, { method: "PATCH", body: { hero_photo_url: url }, prefer: "return=representation" });
        if (d?.[0]) setProfile(d[0]);
      } catch (e) { alert("Save failed: " + e.message); }
    });
  };

  const handleHeadshotUpload = (file) => {
    setUploading("headshot");
    uploadToCloudinary(file, async (url) => {
      try {
        const d = await supaFetch(`/rest/v1/profiles?id=eq.${user.id}`, { method: "PATCH", body: { headshot_url: url }, prefer: "return=representation" });
        if (d?.[0]) setProfile(d[0]);
      } catch (e) { alert("Save failed: " + e.message); }
    });
  };

  const handleAdditionalUpload = (file) => {
    setUploading("additional");
    uploadToCloudinary(file, async (url) => {
      const updated = [...additionalPhotos, { url, caption: "", uploaded_at: new Date().toISOString() }];
      try {
        const d = await supaFetch(`/rest/v1/profiles?id=eq.${user.id}`, { method: "PATCH", body: { additional_photos: updated }, prefer: "return=representation" });
        if (d?.[0]) { setProfile(d[0]); setAdditionalPhotos(updated); }
      } catch (e) { alert("Save failed: " + e.message); }
    });
  };

  const removeAdditional = async (idx) => {
    if (!confirm("Remove this photo?")) return;
    const updated = additionalPhotos.filter((_, i) => i !== idx);
    try {
      const d = await supaFetch(`/rest/v1/profiles?id=eq.${user.id}`, { method: "PATCH", body: { additional_photos: updated }, prefer: "return=representation" });
      if (d?.[0]) { setProfile(d[0]); setAdditionalPhotos(updated); }
    } catch (e) { alert("Remove failed: " + e.message); }
  };

  const removePhoto = async (field) => {
    if (!confirm("Remove this photo?")) return;
    try {
      const d = await supaFetch(`/rest/v1/profiles?id=eq.${user.id}`, { method: "PATCH", body: { [field]: null }, prefer: "return=representation" });
      if (d?.[0]) setProfile(d[0]);
    } catch (e) { alert("Remove failed: " + e.message); }
  };

  const DropZone = ({ type, label, hint, icon, onDrop, currentUrl, aspect, field }) => {
    const isUploading = uploading === type;
    return (
      <div style={{background:C.cardBg,border:`1px solid ${C.border}`,borderRadius:10,overflow:"hidden"}}>
        {currentUrl ? (
          <div style={{position:"relative"}}>
            <img src={currentUrl} style={{width:"100%",aspectRatio:aspect||"16/9",objectFit:"cover",display:"block"}}/>
            <div style={{position:"absolute",top:8,right:8,display:"flex",gap:4}}>
              <button onClick={()=>{const i=document.createElement("input");i.type="file";i.accept="image/*";i.onchange=e=>onDrop(e.target.files[0]);i.click();}} style={{padding:"6px 12px",background:"rgba(0,0,0,0.7)",backdropFilter:"blur(8px)",border:"1px solid rgba(255,255,255,0.2)",borderRadius:6,color:"#fff",cursor:"pointer",fontSize:11,fontWeight:600,fontFamily:"'Barlow Condensed',sans-serif",letterSpacing:1,textTransform:"uppercase"}}>Replace</button>
              <button onClick={()=>removePhoto(field)} style={{padding:"6px 10px",background:"rgba(196,30,58,0.8)",border:"none",borderRadius:6,color:"#fff",cursor:"pointer",fontSize:12}}><Icon name="trash" size={14}/></button>
            </div>
            <div style={{padding:"12px 16px",borderTop:`1px solid ${C.border}`}}>
              <div style={{fontSize:13,fontWeight:700,color:C.cream}}>{label}</div>
              <div style={{fontSize:11,color:C.success,marginTop:2}}>Uploaded</div>
            </div>
          </div>
        ) : isUploading ? (
          <div style={{padding:"40px 20px",textAlign:"center"}}>
            <div style={{fontSize:13,fontWeight:600,color:C.cream,marginBottom:12}}>Uploading...</div>
            <div style={{width:"100%",height:6,background:C.border,borderRadius:3,overflow:"hidden"}}>
              <div style={{width:uploadProgress+"%",height:"100%",background:C.red,borderRadius:3,transition:"width 0.3s"}}/>
            </div>
            <div style={{fontSize:11,color:C.textDim,marginTop:6}}>{uploadProgress}%</div>
          </div>
        ) : (
          <div
            onDragOver={e=>{e.preventDefault();e.currentTarget.style.borderColor=C.gold;}}
            onDragLeave={e=>{e.currentTarget.style.borderColor="transparent";}}
            onDrop={e=>{e.preventDefault();e.currentTarget.style.borderColor="transparent";onDrop(e.dataTransfer.files[0]);}}
            onClick={()=>{const i=document.createElement("input");i.type="file";i.accept="image/*";i.onchange=e=>onDrop(e.target.files[0]);i.click();}}
            style={{padding:"40px 20px",textAlign:"center",cursor:"pointer",border:"2px dashed transparent",transition:"border-color 0.2s",margin:4,borderRadius:8}}
          >
            <div style={{fontSize:32,marginBottom:8,opacity:0.5}}>{icon}</div>
            <div style={{fontSize:14,fontWeight:700,color:C.cream,marginBottom:4}}>{label}</div>
            <div style={{fontSize:12,color:C.textMuted,lineHeight:1.5}}>{hint}</div>
            <div style={{fontSize:11,color:C.textDim,marginTop:8}}>Drop image here or click to browse</div>
          </div>
        )}
      </div>
    );
  };

  return (
    <div style={{maxWidth:700}}>
      <div style={{display:"grid",gridTemplateColumns:"1fr",gap:16}}>
        <DropZone
          type="hero"
          field="hero_photo_url"
          label="Hero / Action Photo"
          hint="This is the big background photo on your site. An action shot works best."
          icon="📸"
          aspect="16/9"
          onDrop={handleHeroUpload}
          currentUrl={profile?.hero_photo_url}
        />

        <DropZone
          type="headshot"
          field="headshot_url"
          label="Headshot / Portrait"
          hint="Used in the About section. A clean, well-lit photo works great."
          icon="🤳"
          aspect="3/4"
          onDrop={handleHeadshotUpload}
          currentUrl={profile?.headshot_url}
        />
      </div>

      <div style={{background:C.cardBg,border:`1px solid ${C.border}`,borderRadius:10,padding:24,marginTop:16}}>
        <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:4}}>
          <div style={{fontFamily:"'Bebas Neue',sans-serif",fontSize:20,letterSpacing:2}}>ADDITIONAL PHOTOS</div>
          <div style={{padding:"4px 12px",background:`${C.gold}20`,border:`1px solid ${C.gold}40`,borderRadius:6,fontSize:11,fontWeight:700,color:C.gold,fontFamily:"'Barlow Condensed',sans-serif",letterSpacing:1}}>{additionalPhotos.length} photos</div>
        </div>
        <div style={{fontSize:13,color:C.textMuted,marginBottom:16}}>Team photos, press clippings, awards, training photos. These appear in a gallery section on your site.</div>

        {additionalPhotos.length > 0 && (
          <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill, minmax(140px, 1fr))",gap:8,marginBottom:16}}>
            {additionalPhotos.map((photo, i) => (
              <div key={i} style={{position:"relative",borderRadius:8,overflow:"hidden",border:`1px solid ${C.border}`}}>
                <img src={photo.url} style={{width:"100%",aspectRatio:"1/1",objectFit:"cover",display:"block"}}/>
                <button onClick={()=>removeAdditional(i)} style={{position:"absolute",top:4,right:4,width:24,height:24,borderRadius:"50%",background:"rgba(196,30,58,0.85)",border:"none",color:"#fff",cursor:"pointer",fontSize:12,display:"flex",alignItems:"center",justifyContent:"center"}}>✕</button>
              </div>
            ))}
          </div>
        )}

        {uploading === "additional" ? (
          <div style={{padding:"20px 16px",background:C.navyLight,border:`1px solid ${C.border}`,borderRadius:8,textAlign:"center"}}>
            <div style={{fontSize:13,fontWeight:600,color:C.cream,marginBottom:8}}>Uploading...</div>
            <div style={{width:"100%",height:6,background:C.border,borderRadius:3,overflow:"hidden"}}>
              <div style={{width:uploadProgress+"%",height:"100%",background:C.red,borderRadius:3,transition:"width 0.3s"}}/>
            </div>
          </div>
        ) : (
          <div
            onDragOver={e=>{e.preventDefault();e.currentTarget.style.borderColor=C.gold;}}
            onDragLeave={e=>{e.currentTarget.style.borderColor=C.border;}}
            onDrop={e=>{e.preventDefault();e.currentTarget.style.borderColor=C.border;handleAdditionalUpload(e.dataTransfer.files[0]);}}
            onClick={()=>{const i=document.createElement("input");i.type="file";i.accept="image/*";i.onchange=e=>handleAdditionalUpload(e.target.files[0]);i.click();}}
            style={{width:"100%",padding:"16px 0",background:"transparent",border:`2px dashed ${C.border}`,borderRadius:8,color:C.textMuted,cursor:"pointer",fontFamily:"'Barlow Condensed',sans-serif",fontWeight:700,fontSize:14,letterSpacing:1,textTransform:"uppercase",textAlign:"center",transition:"all 0.15s"}}
            onMouseOver={e=>{e.currentTarget.style.borderColor=C.gold;e.currentTarget.style.color=C.gold;}}
            onMouseOut={e=>{e.currentTarget.style.borderColor=C.border;e.currentTarget.style.color=C.textMuted;}}
          >+ Add Photo</div>
        )}
      </div>

      <div style={{background:`${C.gold}10`,border:`1px solid ${C.gold}30`,borderRadius:10,padding:"16px 20px",marginTop:16,fontSize:13,color:C.textMuted}}>
        <strong style={{color:C.gold}}>How photos work:</strong> Upload your hero/action photo and headshot here. They're saved to the cloud automatically. Hit Publish on the My Stats page to push them live on your recruiting site.
      </div>
    </div>
  );
}

// ── MAIN APP ──
function App() {
  const [user, setUser] = useState(null);
  const [loading, setLoading] = useState(true);
  const [page, setPage] = useState("colleges");
  const [profile, setProfile] = useState(null);
  const [sidebarOpen, setSidebarOpen] = useState(true);

  const loadProfile=async(u)=>{
    const uid=typeof u==="string"?u:u?.id;
    const email=typeof u==="string"?"":u?.email||"";
    try{
      const data=await supaFetch(`/rest/v1/profiles?id=eq.${uid}&select=*`);
      if(data?.[0]){setProfile(data[0]);}
      else{try{const created=await supaFetch("/rest/v1/profiles",{method:"POST",body:{id:uid,email:email,full_name:""},prefer:"return=representation"});if(created?.[0])setProfile(created[0]);}catch(e){console.log("Auto-create:",e);}}
    }catch(e){console.log("Profile load:",e);}
  };

  useEffect(()=>{
    const token=localStorage.getItem("pp_token");
    if(token){authApi.getUser().then(async(u)=>{setUser(u);await loadProfile(u);}).catch(()=>{localStorage.removeItem("pp_token");}).finally(()=>setLoading(false));}
    else{setLoading(false);}
  },[]);

  const handleAuth=async(token,userData)=>{localStorage.setItem("pp_token",token);setUser(userData);await loadProfile(userData);setLoading(false);};
  const handleLogout=()=>{localStorage.removeItem("pp_token");setUser(null);setProfile(null);};

  if(loading)return(<div style={{background:C.navy,minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center"}}><div style={{textAlign:"center"}}><PPLogo size={48}/><div style={{color:C.cream,fontFamily:"'Bebas Neue',sans-serif",fontSize:24,letterSpacing:3,marginTop:16}}>LOADING...</div></div></div>);
  if(!user)return <AuthScreen onAuth={handleAuth}/>;

  return (
    <div style={{display:"flex",minHeight:"100vh",background:C.navy,fontFamily:"'Barlow',sans-serif",color:C.cream}}>
      <aside style={{width:sidebarOpen?240:64,transition:"width 0.25s ease",background:C.navyMid,borderRight:`1px solid ${C.border}`,display:"flex",flexDirection:"column",flexShrink:0,overflow:"hidden"}}>
        <div style={{padding:"20px 16px",display:"flex",alignItems:"center",gap:12,borderBottom:`1px solid ${C.border}`}}>
          <PPLogo size={28}/>
          {sidebarOpen&&<div><div style={{fontFamily:"'Bebas Neue',sans-serif",fontSize:18,letterSpacing:2,lineHeight:1}}>PROSPECT</div><div style={{fontFamily:"'Bebas Neue',sans-serif",fontSize:18,letterSpacing:2,lineHeight:1,color:C.red}}>PAGES</div></div>}
        </div>
        <nav style={{flex:1,padding:"12px 8px"}}>
          {[{id:"colleges",icon:"school",label:"College Directory"},{id:"email",icon:"mail",label:"AI Email Builder"},{id:"outreach",icon:"send",label:"Outreach Tracker"},{id:"stats",icon:"star",label:"My Stats"},{id:"photos",icon:"camera",label:"Photo Manager"},{id:"videos",icon:"film",label:"Video Manager"},{id:"profile",icon:"user",label:"Athlete Profile"}].map(item=>(
            <button key={item.id} onClick={()=>setPage(item.id)} style={{display:"flex",alignItems:"center",gap:12,width:"100%",padding:sidebarOpen?"12px 16px":"12px 20px",background:page===item.id?C.navyLight:"transparent",border:"none",borderRadius:8,color:page===item.id?C.cream:C.textMuted,cursor:"pointer",fontSize:14,fontWeight:600,fontFamily:"'Barlow',sans-serif",marginBottom:4,transition:"all 0.15s",borderLeft:page===item.id?`3px solid ${C.red}`:"3px solid transparent"}}><Icon name={item.icon} size={18}/>{sidebarOpen&&<span>{item.label}</span>}</button>
          ))}
        </nav>
        <div style={{padding:"12px 8px",borderTop:`1px solid ${C.border}`}}>
          <button onClick={handleLogout} style={{display:"flex",alignItems:"center",gap:12,width:"100%",padding:sidebarOpen?"12px 16px":"12px 20px",background:"transparent",border:"none",borderRadius:8,color:C.textMuted,cursor:"pointer",fontSize:13,fontFamily:"'Barlow',sans-serif"}}><Icon name="logout" size={16}/>{sidebarOpen&&<span>Sign Out</span>}</button>
        </div>
      </aside>
      <main style={{flex:1,overflow:"auto",maxHeight:"100vh"}}>
        <header style={{padding:"16px 32px",borderBottom:`1px solid ${C.border}`,display:"flex",alignItems:"center",justifyContent:"space-between",background:C.navyMid}}>
          <div>
            <h1 style={{fontFamily:"'Bebas Neue',sans-serif",fontSize:28,letterSpacing:2,margin:0}}>{page==="colleges"&&"COLLEGE DIRECTORY"}{page==="email"&&"AI EMAIL BUILDER"}{page==="outreach"&&"OUTREACH TRACKER"}{page==="stats"&&"MY STATS"}{page==="photos"&&"PHOTO MANAGER"}{page==="videos"&&"VIDEO MANAGER"}{page==="profile"&&"ATHLETE PROFILE"}</h1>
            <p style={{margin:0,fontSize:13,color:C.textMuted}}>{page==="colleges"&&"Search and filter programs by state, division, and sport"}{page==="email"&&"Generate personalized coach outreach emails with AI"}{page==="outreach"&&"Track your emails, follow-ups, and coach responses"}{page==="stats"&&"Update your measurables and performance stats"}{page==="photos"&&"Upload your hero photo, headshot, and additional images"}{page==="videos"&&"Add, reorder, and categorize your highlight clips"}{page==="profile"&&"Your athlete's info used in email templates"}</p>
          </div>
          <div style={{display:"flex",alignItems:"center",gap:12}}>
            <div style={{width:36,height:36,borderRadius:"50%",background:C.red,display:"flex",alignItems:"center",justifyContent:"center",fontWeight:700,fontSize:14}}>{(profile?.full_name||user?.email||"?")[0].toUpperCase()}</div>
          </div>
        </header>
        <div style={{padding:"24px 32px"}}>
          {page==="colleges"&&<CollegeDirectory profile={profile} onNavigateEmail={(college,coach)=>{setPage("email");window.__prefill={college,coach};}} onBatchEmail={(colleges)=>{setPage("email");window.__batchPrefill=colleges;}}/>}
          {page==="email"&&<EmailBuilder profile={profile} user={user}/>}
          {page==="outreach"&&<OutreachTracker profile={profile} user={user}/>}
          {page==="stats"&&<StatsEditor profile={profile} setProfile={setProfile} user={user}/>}
          {page==="photos"&&<PhotoManager profile={profile} setProfile={setProfile} user={user}/>}
          {page==="videos"&&<VideoManager profile={profile} user={user}/>}
              {page==="profile"&&<ProfileEditor profile={profile} setProfile={setProfile} user={user}/>}
        </div>
      </main>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
