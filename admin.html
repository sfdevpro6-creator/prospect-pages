const ADMIN_PIN = "1776"; // Simple admin PIN — change this

const supaFetch = async (path, opts = {}) => {
  const token = localStorage.getItem("pp_admin_token");
  const res = await fetch(`${SUPABASE_URL}${path}`, {
    ...opts,
    headers: {
      apikey: SUPABASE_KEY,
      Authorization: `Bearer ${token || SUPABASE_KEY}`,
      "Content-Type": "application/json",
      Prefer: opts.prefer || "return=representation",
      ...opts.headers,
    },
    body: opts.body ? JSON.stringify(opts.body) : undefined,
  });
  if (!res.ok) {
    const err = await res.json().catch(() => ({}));
    throw new Error(err.msg || err.message || res.statusText);
  }
  const text = await res.text();
  return text ? JSON.parse(text) : null;
};

// ── ADMIN LOGIN ──
function AdminLogin({ onLogin }) {
  const [pin, setPin] = useState("");
  const [email, setEmail] = useState("");
  const [password, setPassword] = useState("");
  const [error, setError] = useState("");
  const [loading, setLoading] = useState(false);

  const handleLogin = async () => {
    setError(""); setLoading(true);
    try {
      // Try Supabase auth
      const res = await supaFetch("/auth/v1/token?grant_type=password", {
        method: "POST",
        body: { email, password },
        headers: { apikey: SUPABASE_KEY, Authorization: `Bearer ${SUPABASE_KEY}` },
      });
      if (res?.access_token) {
        localStorage.setItem("pp_admin_token", res.access_token);
        // Check if user is admin (you'll set this in Supabase)
        onLogin(res.user);
      }
    } catch (e) {
      // Fallback: PIN-based access
      if (pin === ADMIN_PIN) {
        localStorage.setItem("pp_admin_authed", "1");
        onLogin({ email: "admin", id: "admin" });
      } else {
        setError("Invalid credentials");
      }
    }
    setLoading(false);
  };

  const inp = { width:"100%",padding:"14px 16px",background:C.navyLight,border:`1px solid ${C.border}`,borderRadius:8,color:C.cream,fontSize:15,fontFamily:"'Barlow',sans-serif",outline:"none" };

  return (
    <div style={{minHeight:"100vh",background:C.navy,display:"flex",alignItems:"center",justifyContent:"center",fontFamily:"'Barlow',sans-serif",color:C.cream}}>
      <div style={{width:380,padding:40}}>
        <div style={{textAlign:"center",marginBottom:32}}>
          <PPLogo size={48}/>
          <div style={{fontFamily:"'Bebas Neue',sans-serif",fontSize:28,letterSpacing:3,marginTop:16}}>ADMIN PANEL</div>
          <div style={{fontSize:12,color:C.textDim,marginTop:4}}>Prospect Pages Site Manager</div>
        </div>
        <div style={{background:C.cardBg,borderRadius:12,padding:28,border:`1px solid ${C.border}`}}>
          {error&&<div style={{padding:"10px 14px",background:"#C41E3A20",border:"1px solid #C41E3A40",borderRadius:8,fontSize:13,color:C.red,marginBottom:14}}>{error}</div>}
          <div style={{display:"flex",flexDirection:"column",gap:12}}>
            <div style={{fontSize:11,color:C.textMuted,textTransform:"uppercase",letterSpacing:1.5,fontWeight:600}}>Admin PIN</div>
            <input type="password" placeholder="Enter PIN" value={pin} onChange={e=>setPin(e.target.value)} onKeyDown={e=>e.key==="Enter"&&handleLogin()} style={{...inp,textAlign:"center",fontSize:24,letterSpacing:8,fontFamily:"'Barlow Condensed',sans-serif"}} maxLength={6}/>
            <button onClick={handleLogin} disabled={loading} style={{padding:"14px 0",background:C.red,border:"none",borderRadius:8,color:C.cream,fontFamily:"'Barlow Condensed',sans-serif",fontWeight:700,fontSize:16,letterSpacing:2,textTransform:"uppercase",cursor:"pointer",marginTop:8}}>{loading?"...":"ACCESS"}</button>
          </div>
        </div>
      </div>
    </div>
  );
}

// ── STATUS BADGE ──
function StatusBadge({ status }) {
  const colors = {
    pending: { bg: "#EAB30820", text: "#EAB308", border: "#EAB30840" },
    generated: { bg: "#3B82F620", text: "#3B82F6", border: "#3B82F640" },
    published: { bg: "#22C55E20", text: "#22C55E", border: "#22C55E40" },
  };
  const c = colors[status] || colors.pending;
  return (
    <span style={{padding:"4px 10px",background:c.bg,color:c.text,border:`1px solid ${c.border}`,borderRadius:20,fontSize:11,fontWeight:700,fontFamily:"'Barlow Condensed',sans-serif",letterSpacing:1.5,textTransform:"uppercase"}}>{status}</span>
  );
}

// ── SITE DETAIL / EDITOR ──
function SiteDetail({ site, onBack, onUpdate }) {
  const [editing, setEditing] = useState(false);
  const [bio, setBio] = useState(site.generated_bio || "");
  const [saving, setSaving] = useState(false);
  const [copied, setCopied] = useState(false);
  const [codeCopied, setCodeCopied] = useState(false);
  const [previewMode, setPreviewMode] = useState("preview");
  const [deploying, setDeploying] = useState(false);
  const [deployError, setDeployError] = useState("");
  const iframeRef = useRef(null);

  const saveBio = async () => {
    setSaving(true);
    try {
      // Also update the bio inside the generated HTML
      let updatedHtml = site.generated_html || "";
      if (updatedHtml && site.generated_bio) {
        // Replace old bio with new bio inside the about-bio paragraph
        updatedHtml = updatedHtml.replace(site.generated_bio, bio);
      }
      await supaFetch(`/rest/v1/sites?id=eq.${site.id}`, {
        method: "PATCH",
        body: { generated_bio: bio, generated_html: updatedHtml },
      });
      onUpdate({ ...site, generated_bio: bio, generated_html: updatedHtml });
    } catch (e) { alert("Save failed: " + e.message); }
    setSaving(false);
    setEditing(false);
  };

  const deploySite = async () => {
    setDeploying(true);
    setDeployError("");
    try {
      const res = await fetch("/.netlify/functions/deploy-site", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ site_id: site.id }),
      });
      const data = await res.json();
      if (data.success) {
        onUpdate({ ...site, status: "published", site_url: data.site_url, netlify_site_id: data.netlify_site_id });
      } else {
        setDeployError(data.error || "Deploy failed");
      }
    } catch (e) {
      setDeployError(e.message);
    }
    setDeploying(false);
  };

  const unpublish = async () => {
    try {
      await supaFetch(`/rest/v1/sites?id=eq.${site.id}`, {
        method: "PATCH",
        body: { status: "generated" },
      });
      onUpdate({ ...site, status: "generated" });
    } catch (e) { alert("Update failed: " + e.message); }
  };

  const copyHtml = () => {
    navigator.clipboard.writeText(site.generated_html || "");
    setCopied(true);
    setTimeout(() => setCopied(false), 2000);
  };

  const copyInvite = () => {
    navigator.clipboard.writeText(site.invite_code || "");
    setCodeCopied(true);
    setTimeout(() => setCodeCopied(false), 2000);
  };

  // Write HTML to iframe
  useEffect(() => {
    if (iframeRef.current && site.generated_html && previewMode === "preview") {
      const doc = iframeRef.current.contentDocument;
      doc.open();
      doc.write(site.generated_html);
      doc.close();
    }
  }, [site.generated_html, previewMode]);

  const cardStyle = { background:C.cardBg, border:`1px solid ${C.border}`, borderRadius:10, padding:20, marginBottom:16 };
  const labelStyle = { fontSize:11, fontWeight:600, textTransform:"uppercase", letterSpacing:1.2, color:C.textMuted, marginBottom:6 };
  const valStyle = { fontSize:14, color:C.cream };

  return (
    <div style={{fontFamily:"'Barlow',sans-serif",color:C.cream}}>
      {/* Header */}
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:24}}>
        <div style={{display:"flex",alignItems:"center",gap:16}}>
          <button onClick={onBack} style={{padding:"8px 16px",background:"transparent",border:`1px solid ${C.border}`,borderRadius:6,color:C.textMuted,cursor:"pointer",fontFamily:"'Barlow Condensed',sans-serif",fontWeight:700,fontSize:13,letterSpacing:1}}>← BACK</button>
          <div>
            <h2 style={{fontFamily:"'Bebas Neue',sans-serif",fontSize:28,letterSpacing:2,margin:0}}>{site.athlete_name || "Unnamed"}</h2>
            <div style={{fontSize:13,color:C.textMuted}}>{site.sport} • Class of {site.grad_year} • {site.city_state}</div>
          </div>
          <StatusBadge status={site.status}/>
        </div>
        <div style={{display:"flex",gap:8,alignItems:"center"}}>
          {deployError && <div style={{fontSize:12,color:C.red,maxWidth:250}}>{deployError}</div>}
          {site.site_url && <a href={site.site_url} target="_blank" style={{fontSize:12,color:C.gold,textDecoration:"none",marginRight:8}}>{site.site_url} ↗</a>}
          {site.status !== "published" && (
            <button onClick={deploySite} disabled={deploying} style={{padding:"10px 20px",background:deploying?"#666":C.success,border:"none",borderRadius:8,color:"#fff",cursor:deploying?"wait":"pointer",fontFamily:"'Barlow Condensed',sans-serif",fontWeight:700,fontSize:14,letterSpacing:1.5,textTransform:"uppercase",opacity:deploying?0.7:1}}>{deploying?"DEPLOYING...":"PUBLISH TO NETLIFY"}</button>
          )}
          {site.status === "published" && (
            <Fragment>
              <button onClick={deploySite} disabled={deploying} style={{padding:"10px 20px",background:deploying?"#666":"#3B82F6",border:"none",borderRadius:8,color:"#fff",cursor:deploying?"wait":"pointer",fontFamily:"'Barlow Condensed',sans-serif",fontWeight:700,fontSize:14,letterSpacing:1.5,textTransform:"uppercase",opacity:deploying?0.7:1}}>{deploying?"DEPLOYING...":"RE-DEPLOY"}</button>
              <button onClick={unpublish} style={{padding:"10px 20px",background:C.warn,border:"none",borderRadius:8,color:"#000",cursor:"pointer",fontFamily:"'Barlow Condensed',sans-serif",fontWeight:700,fontSize:14,letterSpacing:1.5,textTransform:"uppercase"}}>Unpublish</button>
            </Fragment>
          )}
        </div>
      </div>

      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:20}}>
        {/* Left column: Details */}
        <div>
          {/* Invite Code */}
          <div style={cardStyle}>
            <div style={{display:"flex",alignItems:"center",justifyContent:"space-between"}}>
              <div>
                <div style={labelStyle}>Invite Code</div>
                <div style={{fontFamily:"'Barlow Condensed',sans-serif",fontSize:28,fontWeight:700,letterSpacing:4,color:C.gold}}>{site.invite_code || "N/A"}</div>
              </div>
              <button onClick={copyInvite} style={{padding:"8px 16px",background:codeCopied?C.success+"30":"transparent",border:`1px solid ${codeCopied?C.success:C.border}`,borderRadius:6,color:codeCopied?C.success:C.textMuted,cursor:"pointer",fontSize:12,fontFamily:"'Barlow',sans-serif"}}>{codeCopied?"Copied!":"Copy Code"}</button>
            </div>
            <div style={{fontSize:11,color:C.textDim,marginTop:6}}>Give this to the family so they can sign up for the dashboard</div>
          </div>

          {/* Live site URL */}
          {site.site_url && (
            <div style={cardStyle}>
              <div style={labelStyle}>Live Site</div>
              <a href={site.site_url} target="_blank" style={{fontFamily:"'Barlow Condensed',sans-serif",fontSize:18,fontWeight:700,color:C.success,textDecoration:"none",letterSpacing:0.5,wordBreak:"break-all"}}>{site.site_url} ↗</a>
              <div style={{fontSize:11,color:C.textDim,marginTop:6}}>This site is live and accessible to coaches</div>
            </div>
          )}

          {/* Parent info */}
          <div style={cardStyle}>
            <div style={labelStyle}>Parent / Guardian</div>
            <div style={valStyle}>{site.parent_name}</div>
            <div style={{fontSize:13,color:C.gold,marginTop:2}}>{site.parent_email}</div>
            {site.parent_phone && <div style={{fontSize:13,color:C.textMuted,marginTop:2}}>{site.parent_phone} ({site.contact_method})</div>}
          </div>

          {/* Athlete info */}
          <div style={cardStyle}>
            <div style={labelStyle}>Athlete Details</div>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12,marginTop:8}}>
              {[
                ["Position", site.position],
                ["School", site.high_school],
                ["Height", site.height],
                ["Weight", site.weight],
                ["GPA", site.gpa],
                [site.hand_label || "Bats/Throws", site.hand_detail],
                ["Travel Team", site.travel_team],
                ["Color Pref", site.color_pref],
              ].filter(([,v])=>v).map(([label, val]) => (
                <div key={label}>
                  <div style={{fontSize:10,color:C.textDim,textTransform:"uppercase",letterSpacing:1}}>{label}</div>
                  <div style={{fontSize:14,color:C.cream}}>{val}</div>
                </div>
              ))}
            </div>
          </div>

          {/* Stats */}
          {site.stats && site.stats.length > 0 && (
            <div style={cardStyle}>
              <div style={labelStyle}>Performance Stats</div>
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginTop:8}}>
                {site.stats.map((s, i) => (
                  <div key={i} style={{padding:"8px 12px",background:C.navyLight,borderRadius:6}}>
                    <div style={{fontSize:18,fontWeight:700,fontFamily:"'Bebas Neue',sans-serif",color:C.cream}}>{s.value}</div>
                    <div style={{fontSize:11,color:C.textMuted}}>{s.label}</div>
                  </div>
                ))}
              </div>
            </div>
          )}

          {/* Story answers */}
          <div style={cardStyle}>
            <div style={labelStyle}>Story Answers (from parent)</div>
            {[
              ["How they got started", site.story_how_started],
              ["What drives them", site.story_what_drives],
              ["Proud moment", site.story_proud_moment],
              ["Goals", site.story_goals],
              ["Off the field", site.story_personality],
              ["Extra", site.story_extra],
            ].filter(([,v])=>v).map(([label, val]) => (
              <div key={label} style={{marginTop:12}}>
                <div style={{fontSize:11,color:C.gold,textTransform:"uppercase",letterSpacing:1,marginBottom:3}}>{label}</div>
                <div style={{fontSize:13,color:C.textMuted,lineHeight:1.6}}>{val}</div>
              </div>
            ))}
          </div>

          {/* Bio editor */}
          <div style={cardStyle}>
            <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:8}}>
              <div style={labelStyle}>Generated Bio</div>
              <button onClick={()=>setEditing(!editing)} style={{padding:"4px 12px",background:"transparent",border:`1px solid ${C.border}`,borderRadius:4,color:C.textMuted,cursor:"pointer",fontSize:11,fontFamily:"'Barlow',sans-serif"}}>{editing?"Cancel":"Edit Bio"}</button>
            </div>
            {editing ? (
              <div>
                <textarea value={bio} onChange={e=>setBio(e.target.value)} style={{width:"100%",minHeight:200,padding:12,background:C.navyLight,border:`1px solid ${C.border}`,borderRadius:8,color:C.cream,fontSize:14,fontFamily:"'Barlow',sans-serif",lineHeight:1.7,outline:"none",resize:"vertical"}}/>
                <button onClick={saveBio} disabled={saving} style={{marginTop:8,padding:"10px 20px",background:C.gold,border:"none",borderRadius:6,color:"#000",cursor:"pointer",fontWeight:700,fontSize:13}}>{saving?"Saving...":"Save Bio"}</button>
              </div>
            ) : (
              <div style={{fontSize:14,color:C.textMuted,lineHeight:1.7}} dangerouslySetInnerHTML={{__html: bio || "<em>No bio generated</em>"}}/>
            )}
          </div>

          {site.notes && (
            <div style={cardStyle}>
              <div style={labelStyle}>Additional Notes</div>
              <div style={{fontSize:13,color:C.textMuted,lineHeight:1.6}}>{site.notes}</div>
            </div>
          )}

          {site.drive_link && (
            <div style={cardStyle}>
              <div style={labelStyle}>Media Link</div>
              <a href={site.drive_link} target="_blank" style={{fontSize:14,color:C.gold,wordBreak:"break-all"}}>{site.drive_link}</a>
            </div>
          )}
        </div>

        {/* Right column: Preview */}
        <div>
          <div style={{position:"sticky",top:20}}>
            <div style={{display:"flex",gap:8,marginBottom:12}}>
              <button onClick={()=>setPreviewMode("preview")} style={{flex:1,padding:"10px 0",background:previewMode==="preview"?C.navyLight:"transparent",border:`1px solid ${C.border}`,borderRadius:6,color:C.cream,cursor:"pointer",fontFamily:"'Barlow Condensed',sans-serif",fontWeight:700,fontSize:13,letterSpacing:1.5,textTransform:"uppercase"}}>Preview</button>
              <button onClick={()=>setPreviewMode("html")} style={{flex:1,padding:"10px 0",background:previewMode==="html"?C.navyLight:"transparent",border:`1px solid ${C.border}`,borderRadius:6,color:C.cream,cursor:"pointer",fontFamily:"'Barlow Condensed',sans-serif",fontWeight:700,fontSize:13,letterSpacing:1.5,textTransform:"uppercase"}}>HTML Source</button>
            </div>

            {previewMode === "preview" ? (
              <div style={{borderRadius:10,overflow:"hidden",border:`1px solid ${C.border}`,background:"#000"}}>
                <div style={{background:C.navyLight,padding:"8px 12px",display:"flex",alignItems:"center",gap:6,borderBottom:`1px solid ${C.border}`}}>
                  <div style={{width:8,height:8,borderRadius:"50%",background:"#ff5f57"}}/>
                  <div style={{width:8,height:8,borderRadius:"50%",background:"#ffbd2e"}}/>
                  <div style={{width:8,height:8,borderRadius:"50%",background:"#28ca41"}}/>
                  <div style={{fontSize:11,color:C.textDim,marginLeft:8,fontFamily:"monospace"}}>{site.domain_pref || `${(site.athlete_name||"athlete").toLowerCase().replace(/\s+/g,"-")}.netlify.app`}</div>
                </div>
                <iframe ref={iframeRef} style={{width:"100%",height:"calc(100vh - 200px)",border:"none",background:"#0a0a0c"}} title="Site Preview"/>
              </div>
            ) : (
              <div style={{position:"relative"}}>
                <button onClick={copyHtml} style={{position:"absolute",top:8,right:8,padding:"6px 14px",background:copied?C.success:C.red,border:"none",borderRadius:6,color:"#fff",cursor:"pointer",fontSize:12,fontWeight:700,fontFamily:"'Barlow Condensed',sans-serif",letterSpacing:1,zIndex:2}}>{copied?"COPIED!":"COPY HTML"}</button>
                <pre style={{background:C.navyLight,border:`1px solid ${C.border}`,borderRadius:10,padding:16,paddingTop:40,fontSize:11,color:C.textMuted,overflow:"auto",maxHeight:"calc(100vh - 200px)",whiteSpace:"pre-wrap",wordBreak:"break-all",fontFamily:"'Courier New',monospace",lineHeight:1.5}}>
                  {site.generated_html?.slice(0, 5000) || "No HTML generated"}
                  {(site.generated_html?.length || 0) > 5000 && "\n\n... [truncated — use Copy HTML to get full source]"}
                </pre>
              </div>
            )}
          </div>
        </div>
      </div>
    </div>
  );
}

// ── MAIN ADMIN APP ──
function AdminApp({ user, onLogout }) {
  const [sites, setSites] = useState([]);
  const [loading, setLoading] = useState(true);
  const [selectedSite, setSelectedSite] = useState(null);
  const [filter, setFilter] = useState("all");
  const [search, setSearch] = useState("");

  const loadSites = async () => {
    setLoading(true);
    try {
      const data = await supaFetch("/rest/v1/sites?select=*&order=created_at.desc&limit=200");
      setSites(data || []);
    } catch (e) {
      console.error("Load sites:", e);
    }
    setLoading(false);
  };

  useEffect(() => { loadSites(); }, []);

  const handleUpdate = (updated) => {
    setSites(prev => prev.map(s => s.id === updated.id ? { ...s, ...updated } : s));
    setSelectedSite(prev => prev ? { ...prev, ...updated } : null);
  };

  const filtered = sites.filter(s => {
    if (filter !== "all" && s.status !== filter) return false;
    if (search) {
      const q = search.toLowerCase();
      return (s.athlete_name || "").toLowerCase().includes(q) ||
             (s.parent_name || "").toLowerCase().includes(q) ||
             (s.sport || "").toLowerCase().includes(q) ||
             (s.parent_email || "").toLowerCase().includes(q);
    }
    return true;
  });

  const counts = {
    all: sites.length,
    pending: sites.filter(s => s.status === "pending").length,
    generated: sites.filter(s => s.status === "generated").length,
    published: sites.filter(s => s.status === "published").length,
  };

  if (selectedSite) {
    return (
      <div style={{display:"flex",minHeight:"100vh",background:C.navy,fontFamily:"'Barlow',sans-serif",color:C.cream}}>
        <main style={{flex:1,overflow:"auto",maxHeight:"100vh",padding:"24px 32px"}}>
          <SiteDetail site={selectedSite} onBack={()=>setSelectedSite(null)} onUpdate={handleUpdate}/>
        </main>
      </div>
    );
  }

  return (
    <div style={{display:"flex",minHeight:"100vh",background:C.navy,fontFamily:"'Barlow',sans-serif",color:C.cream}}>
      <main style={{flex:1,overflow:"auto",maxHeight:"100vh"}}>
        {/* Header */}
        <header style={{padding:"16px 32px",borderBottom:`1px solid ${C.border}`,display:"flex",alignItems:"center",justifyContent:"space-between",background:C.navyMid}}>
          <div style={{display:"flex",alignItems:"center",gap:16}}>
            <PPLogo size={32}/>
            <div>
              <h1 style={{fontFamily:"'Bebas Neue',sans-serif",fontSize:28,letterSpacing:2,margin:0}}>ADMIN PANEL</h1>
              <p style={{margin:0,fontSize:13,color:C.textMuted}}>Manage all athlete sites</p>
            </div>
          </div>
          <div style={{display:"flex",gap:8}}>
            <button onClick={loadSites} style={{padding:"8px 16px",background:"transparent",border:`1px solid ${C.border}`,borderRadius:6,color:C.textMuted,cursor:"pointer",fontSize:12,fontFamily:"'Barlow',sans-serif"}}>Refresh</button>
            {onLogout && <button onClick={onLogout} style={{padding:"8px 16px",background:"transparent",border:`1px solid ${C.border}`,borderRadius:6,color:C.textDim,cursor:"pointer",fontSize:12,fontFamily:"'Barlow',sans-serif"}}>Logout</button>}
          </div>
        </header>

        <div style={{padding:"24px 32px"}}>
          {/* Stats bar */}
          <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:12,marginBottom:24}}>
            {[
              { label:"Total Sites", value:counts.all, color:C.cream },
              { label:"Pending", value:counts.pending, color:C.warn },
              { label:"Generated", value:counts.generated, color:"#3B82F6" },
              { label:"Published", value:counts.published, color:C.success },
            ].map(s => (
              <div key={s.label} style={{background:C.cardBg,border:`1px solid ${C.border}`,borderRadius:10,padding:"16px 20px"}}>
                <div style={{fontSize:32,fontFamily:"'Bebas Neue',sans-serif",color:s.color,letterSpacing:1}}>{s.value}</div>
                <div style={{fontSize:11,color:C.textDim,textTransform:"uppercase",letterSpacing:1.5,fontWeight:600}}>{s.label}</div>
              </div>
            ))}
          </div>

          {/* Filters + Search */}
          <div style={{display:"flex",gap:12,marginBottom:20,alignItems:"center"}}>
            <div style={{display:"flex",background:C.navyLight,borderRadius:8,padding:3}}>
              {["all","pending","generated","published"].map(f => (
                <button key={f} onClick={()=>setFilter(f)} style={{padding:"8px 16px",border:"none",borderRadius:6,cursor:"pointer",background:filter===f?C.red:"transparent",color:C.cream,fontFamily:"'Barlow Condensed',sans-serif",fontWeight:700,fontSize:13,letterSpacing:1.5,textTransform:"uppercase"}}>{f} ({counts[f]})</button>
              ))}
            </div>
            <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="Search by name, sport, email..." style={{flex:1,padding:"10px 16px",background:C.navyLight,border:`1px solid ${C.border}`,borderRadius:8,color:C.cream,fontSize:14,fontFamily:"'Barlow',sans-serif",outline:"none"}}/>
          </div>

          {/* Sites list */}
          {loading ? (
            <div style={{textAlign:"center",padding:60,color:C.textDim}}>Loading...</div>
          ) : filtered.length === 0 ? (
            <div style={{textAlign:"center",padding:60,color:C.textDim}}>
              <div style={{fontSize:48,marginBottom:12}}>📋</div>
              <div style={{fontSize:16}}>No sites found</div>
              <div style={{fontSize:13,marginTop:4}}>Submissions from the intake form will appear here automatically</div>
            </div>
          ) : (
            <div style={{display:"flex",flexDirection:"column",gap:8}}>
              {filtered.map(site => (
                <div key={site.id} onClick={()=>setSelectedSite(site)} style={{background:C.cardBg,border:`1px solid ${C.border}`,borderRadius:10,padding:"16px 20px",cursor:"pointer",transition:"all 0.15s",display:"grid",gridTemplateColumns:"1fr auto auto auto",gap:20,alignItems:"center"}} onMouseOver={e=>e.currentTarget.style.borderColor=C.gold+"60"} onMouseOut={e=>e.currentTarget.style.borderColor=C.border}>
                  <div>
                    <div style={{fontSize:16,fontWeight:700,marginBottom:2}}>{site.athlete_name || "Unnamed Athlete"}</div>
                    <div style={{fontSize:12,color:C.textMuted}}>{site.sport} • {site.city_state} • Class of {site.grad_year}</div>
                    <div style={{fontSize:11,color:C.textDim,marginTop:2}}>Parent: {site.parent_name} ({site.parent_email})</div>
                  </div>
                  <div style={{textAlign:"right"}}>
                    <div style={{fontFamily:"'Barlow Condensed',sans-serif",fontSize:14,fontWeight:600,color:C.gold,letterSpacing:2}}>{site.invite_code || "—"}</div>
                    <div style={{fontSize:10,color:C.textDim,textTransform:"uppercase",letterSpacing:1}}>Invite Code</div>
                  </div>
                  <StatusBadge status={site.status}/>
                  <div style={{fontSize:11,color:C.textDim,whiteSpace:"nowrap"}}>
                    {new Date(site.created_at).toLocaleDateString("en-US",{month:"short",day:"numeric",year:"numeric"})}
                  </div>
                </div>
              ))}
            </div>
          )}
        </div>
      </main>
    </div>
  );
}

// ── ENTRY POINT ──
function App() {
  const [authed, setAuthed] = useState(() => {
    // Restore session from localStorage
    if (localStorage.getItem("pp_admin_token")) return { email: "supabase", id: "supabase" };
    if (localStorage.getItem("pp_admin_authed") === "1") return { email: "admin", id: "admin" };
    return false;
  });

  const handleLogout = () => {
    localStorage.removeItem("pp_admin_token");
    localStorage.removeItem("pp_admin_authed");
    setAuthed(false);
  };

  return authed ? <AdminApp user={authed} onLogout={handleLogout}/> : <AdminLogin onLogin={(u) => setAuthed(u)}/>;
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
